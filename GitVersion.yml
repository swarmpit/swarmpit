mode: Mainline
branches:
  master:
    regex: ^master$
    tag: ''
    increment: Minor
  develop:
    regex: ^develop$
    tag: beta
    increment: Minor
  feature:
    regex: ^features?[/-]
    tag: alpha
    increment: Minor
  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    tag: pr
    increment: Inherit
