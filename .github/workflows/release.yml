name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release (e.g. 1.10)'
        required: true
        type: string

jobs:
  clojure:
    name: Test & Build Clojure
    env:
      DOCKER: "25.0.5"
    runs-on: ubuntu-latest
    steps:
      - name: checkout tag
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: install java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'
      - name: install clojure tools
        uses: DeLaGuardo/setup-clojure@9.5
        with:
          lein: latest
      - run: ./init-db.sh
        name: start DB
        working-directory: dev/script
      - run: ./init-influx.sh
        name: start Influx
        working-directory: dev/script
      - run: ./init-agent.sh
        name: start Agent
        working-directory: dev/script
      - run: ./start-dind.sh
        name: start Docker in Docker
        working-directory: dev/script
      - run: lein deps
      - run: lein test :all
      - run: lein uberjar
      - name: upload release jar
        uses: actions/upload-artifact@v4
        with:
          name: swarmpit.jar
          path: target/swarmpit.jar

  docker:
    name: Build and push docker
    runs-on: ubuntu-latest
    needs: clojure
    steps:
      - name: checkout tag
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: actions/download-artifact@v4
        name: download release jar
        with:
          name: swarmpit.jar
          path: target
      - name: set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}
      - name: build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64/v8,linux/arm/v7,linux/arm/v5
          tags: swarmpit/swarmpit:${{ inputs.tag || github.ref_name }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - name: checkout tag
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: actions/download-artifact@v4
        name: download release jar
        with:
          name: swarmpit.jar
          path: target
      - name: create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: target/swarmpit.jar
          generate_release_notes: true
